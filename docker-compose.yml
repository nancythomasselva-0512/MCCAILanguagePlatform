version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mcc-saas-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcc_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mcc-saas-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcc-saas-backend
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mcc_saas
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=super-secret-mcc-saas-platform-jwt-key
      - ENCRYPTION_KEY=t-Wd93Ym3uX2pLw_Kz7U8G1e5zP_y7q8W2-v8F5tZ84=
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - whisper_cache:/root/.cache/huggingface

  frontend:
    image: nginx:alpine
    container_name: mcc-saas-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      # Mount built assets
      - ./dist:/usr/share/nginx/html
      # Mount Nginx config mapping /api path
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  postgres_data:
  whisper_cache:
