<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fluentia — Voice to Text, Text to Voice, Translation, and Audio Transcription tools powered by advanced AI." />
    <title>Fluentia | Language Platform — Voice, Text &amp; Translation Tools</title>

    <!-- Anti-FOUC: Apply dark class before React renders to prevent theme flash -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('mcc-ai-theme');
          var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
